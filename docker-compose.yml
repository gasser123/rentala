services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rentala
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: api-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - backend
      - frontend
    env_file:
      - ./server/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"

    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - postgres

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: web-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - frontend
    env_file:
      - ./client/.env
    environment:
      WATCHPACK_POLLING: "true"

    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server

volumes:
  postgres_data:

networks:
  backend:
  frontend:
